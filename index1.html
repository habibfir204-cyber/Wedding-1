<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIY Web Photo Booth</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        
        /* Kontainer Utama */
        #booth-container, #preview-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #preview-container {
            display: none;
            background-color: #000;
            z-index: 10;
            flex-direction: column;
        }

        /* --- SUSUNAN LAYER (Z-INDEX) --- */
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            z-index: 1; 
        }

        #template-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; 
            z-index: 2; 
        }

        /* --- TOMBOL UI --- */
        #capture-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: #ffffff;
            border: 5px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        #capture-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        #flip-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background-color: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 20px;
            cursor: pointer;
            z-index: 5;
            font-size: 14px;
            backdrop-filter: blur(5px);
        }

        /* Tampilan Hasil Akhir */
        #preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 11;
        }

        .action-buttons {
            position: absolute;
            bottom: 40px;
            z-index: 12;
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .btn-save { background-color: #4CAF50; color: white; }
        .btn-retake { background-color: #f44336; color: white; }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="booth-container">
        <video id="webcam" autoplay playsinline></video>
        <img id="template-overlay" src="template.jpg" alt="Template Frame">
        
        <button id="flip-btn" onclick="toggleCamera()">🔄 Balik Kamera</button>
        <button id="capture-btn" onclick="takeSnapshot()"></button>
    </div>

    <div id="preview-container">
        <img id="preview-image" src="" alt="Hasil Foto">
        <div class="action-buttons">
            <button class="btn btn-retake" onclick="retakePhoto()">✖ Ulangi</button>
            <button class="btn btn-save" onclick="savePhoto()">✔ Simpan Foto</button>
        </div>
    </div>

    <canvas id="output-canvas"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output-canvas');
        const templateImg = document.getElementById('template-overlay');
        const boothContainer = document.getElementById('booth-container');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');

        let currentStream = null;
        let useFrontCamera = true; 
        let finalImageDataUrl = ""; 

        // --- PROSES OTOMATIS MENGHILANGKAN BAGIAN HITAM JPG ---
        templateImg.onload = function() {
            if (templateImg.src.startsWith('data:')) return; 

            try {
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = templateImg.naturalWidth;
                tempCanvas.height = templateImg.naturalHeight;
                
                tempCtx.drawImage(templateImg, 0, 0);
                const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
                const data = imgData.data;
                
                for (let i = 0; i < data.length; i += 4) {
                    let r = data[i];
                    let g = data[i+1];
                    let b = data[i+2];
                    
                    // Batas toleransi warna hitam pekat
                    if (r < 30 && g < 30 && b < 30) {
                        data[i+3] = 0; 
                    }
                }
                
                tempCtx.putImageData(imgData, 0, 0);
                templateImg.src = tempCanvas.toDataURL('image/png');
            } catch (e) {
                console.error("Gagal memproses transparansi otomatis secara lokal. Solusi: Gunakan Live Server atau upload ke GitHub Pages.", e);
            }
        };

        function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFrontCamera ? "user" : "environment",
                    width: { ideal: 1080 },
                    height: { ideal: 1920 }
                },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                currentStream = stream;
                video.srcObject = stream;
            })
            .catch(function(err) {
                alert("Gagal mengakses kamera. Pastikan izin kamera aktif dan menggunakan HTTPS.");
                console.log("Error: " + err);
            });
        }

        startCamera();

        function toggleCamera() {
            useFrontCamera = !useFrontCamera;
            startCamera();
        }

        function takeSnapshot() {
            try {
                const ctx = canvas.getContext('2d');
                canvas.width = 1080;
                canvas.height = 1920;

                let videoWidth = video.videoWidth;
                let videoHeight = video.videoHeight;
                let videoAspect = videoWidth / videoHeight;
                let canvasAspect = canvas.width / canvas.height;
                
                let drawWidth, drawHeight, drawX, drawY;
                
                if (videoAspect > canvasAspect) {
                    drawHeight = canvas.height;
                    drawWidth = canvas.height * videoAspect;
                    drawX = (canvas.width - drawWidth) / 2;
                    drawY = 0;
                } else {
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / videoAspect;
                    drawX = 0;
                    drawY = (canvas.height - drawHeight) / 2;
                }
                
                ctx.save();
                if (useFrontCamera) {
                    ctx.translate(canvas.width, 0);
                    ctx.scale(-1, 1);
                }

                ctx.drawImage(video, drawX, drawY, drawWidth, drawHeight);
                ctx.restore(); 

                ctx.drawImage(templateImg, 0, 0, canvas.width, canvas.height);

                finalImageDataUrl = canvas.toDataURL('image/png');
                previewImage.src = finalImageDataUrl;

                boothContainer.style.display = 'none';
                previewContainer.style.with = 'flex';
                previewContainer.style.display = 'flex';
            } catch (error) {
                alert("Gagal mengambil gambar karena pembatasan keamanan browser (CORS). Silakan upload ke GitHub Pages atau jalankan menggunakan Local Server / VS Code Live Server.");
                console.error(error);
            }
        }

        function savePhoto() {
            const downloadLink = document.createElement('a');
            downloadLink.href = finalImageDataUrl;
            downloadLink.download = 'wedding_photobooth_' + Date.now() + '.png';
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

            setTimeout(() => {
                if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
                    alert("Untuk iPhone: Jika tidak terunduh otomatis, tekan lama foto hasil lalu pilih 'Simpan Gambar'.");
                }
            }, 500);

            retakePhoto();
        }

        function retakePhoto() {
            boothContainer.style.display = 'flex';
            previewContainer.style.display = 'none';
            finalImageDataUrl = ""; 
        }
    </script>
</body>
</html>
